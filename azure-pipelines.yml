trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Test
    jobs:
      - job: RunTests
        steps:
          - script: pip install -r requirements.txt
            displayName: Install dependencies

          - script: pytest test_app.py -v
            displayName: Run tests

  - stage: Build
    dependsOn: Test
    jobs:
      - job: BuildAndPush
        steps:
          - task: Docker@2
            displayName: Login to Docker Hub
            inputs:
              command: login
              containerRegistry: dockerhub

          - script: docker build -t amna93/cicd-project:latest .
            displayName: Build Docker image

          - script: docker push amna93/cicd-project:latest
            displayName: Push to Docker Hub